<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجالس فقه النفس - منصة التعليم الإلكترونية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            padding: 60px 40px;
            text-align: center;
        }
        
        h1 {
            color: #2C2C2C;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 40px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 40px 0;
        }
        
        .stat {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            border-right: 4px solid #FF9800;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #FF9800;
        }
        
        .stat-label {
            color: #666;
            margin-top: 10px;
        }
        
        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #FF9800 0%, #FB8C00 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.1em;
            margin-top: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 152, 0, 0.3);
        }
        
        .module-list {
            margin-top: 40px;
            text-align: right;
        }
        
        .module-list h2 {
            color: #2C2C2C;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .module-link {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            color: #2C2C2C;
            transition: all 0.3s;
            border-right: 3px solid #FF9800;
        }
        
        .module-link:hover {
            background: #FF9800;
            color: white;
            transform: translateY(-3px);
        }
        
        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 منصة التعليم الإلكترونية</h1>
        <p class="subtitle">مرحباً بك في منصتك التعليمية</p>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-number">159</div>
                <div class="stat-label">عدد الدروس</div>
            </div>
            <div class="stat">
                <div class="stat-number">100%</div>
                <div class="stat-label">محتوى مجاني</div>
            </div>
            <div class="stat">
                <div class="stat-number">∞</div>
                <div class="stat-label">وقت غير محدود</div>
            </div>
        </div>
        
        <button class="cta-button" onclick="window.location.href='modules/001/index.html'">
            ابدأ التعلم الآن →
        </button>
        
        <div class="module-list">
            <h2>📚 قائمة الدروس</h2>
            <div class="modules-grid">
                <a href="modules/001/index.html" class="module-link">الدرس 001</a>
                <a href="modules/002/index.html" class="module-link">الدرس 002</a>
                <a href="modules/003/index.html" class="module-link">الدرس 003</a>
                <a href="modules/004/index.html" class="module-link">الدرس 004</a>
                <a href="modules/005/index.html" class="module-link">الدرس 005</a>
            </div>
            <p style="margin-top: 20px; color: #999;">... و 154 دروس أخرى</p>
        </div>
        
        <footer>
            <p>تم إنشاء هذه المنصة باستخدام E-Learning Platform Builder</p>
            <p>© 2026 - جميع الحقوق محفوظة</p>
        </footer>
    </div>
</body>
</html>
